---
# vars file for roles/aws-cli

# AWS Configure (BEMOBI)
aws_system_user: glauber.fonseca
aws_profile: default
access_key_id: xxxxxxxxxxxxxxxxxx
secret_access_key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
aws_region: us-east-1
aws_format: json

# Adicionar linhas de configuração no .bashrc
bashrc:
  - echo '' >> /home/glauber.fonseca/.bashrc
  - echo '# AWSGO, ALOG e HISTORY_TIME' >> /home/glauber.fonseca/.bashrc
  - echo 'awsgo() { /usr/bin/ssh -i /home/glauber.fonseca/.ssh/id_rsa_glauberfonseca glauberfonseca@"$@";}' >> /home/glauber.fonseca/.bashrc
  - echo 'alog() { /usr/bin/ssh glauber.fonseca@10.5.9."$@";}' >> /home/glauber.fonseca/.bashrc
  - echo 'HISTTIMEFORMAT="%d/%m/%y %T "' >> /home/glauber.fonseca/.bashrc

# ssh-copy-id
sshcopyid:
  - ssh-copy-id -i /home/mcnd2/.ssh/debiandesk_id_rsa glauber.fonseca@192.168.0.104
